apiVersion: v1
kind: Secret
metadata:
  name: agentrecall-secrets
  namespace: agentrecall
type: Opaque
stringData:
  # 注意：这些值需要替换为实际的密钥
  # 使用命令生成: openssl rand -base64 48
  DB_PASSWORD: "REPLACE_WITH_ACTUAL_DB_PASSWORD"
  JWT_SECRET: "REPLACE_WITH_ACTUAL_JWT_SECRET"
  OTP_MASTER_KEY: "REPLACE_WITH_ACTUAL_OTP_MASTER_KEY"
  DATABASE_URL: "postgresql://agentrecall:REPLACE_WITH_ACTUAL_DB_PASSWORD@postgres:5432/agentrecall"
  REDIS_URL: "redis://redis:6379"
