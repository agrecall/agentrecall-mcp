apiVersion: v1
kind: ConfigMap
metadata:
  name: agentrecall-config
  namespace: agentrecall
data:
  NODE_ENV: "production"
  PORT: "3000"
  JWT_EXPIRES_IN: "2592000"  # 30天（秒）
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: agentrecall
data:
  POSTGRES_USER: "agentrecall"
  POSTGRES_DB: "agentrecall"
  PGDATA: "/var/lib/postgresql/data/pgdata"
