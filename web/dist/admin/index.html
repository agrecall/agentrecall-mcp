<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentRecall Admin - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="page">
        <div class="login-header">
            <a href="/" class="back-link">&larr; <span data-i18n="back_home">Back to Home</span></a>
            <div class="header-controls">
                <select class="lang-selector" id="lang-selector">
                    <option value="en">English</option>
                    <option value="zh">简体中文</option>
                    <option value="zht">繁體中文</option>
                </select>
                <button class="control-btn" id="theme-toggle" title="Toggle Theme">
                    <span id="theme-icon">&#9728;</span>
                </button>
            </div>
        </div>
        <div class="login-container-wrapper">
            <div class="login-container">
                <div class="logo">
                    <h1>&#129302; AgentRecall</h1>
                    <p data-i18n="admin_title">Admin Panel</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label data-i18n="email">Email</label>
                        <input type="email" id="login-email" placeholder="admin@agentrecall.io" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter password" required>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember-password">
                            <span data-i18n="remember_password">Remember Password</span>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" data-i18n="login">Login</button>
                <p class="forgot-password-link"><a href="reset-password.html" data-i18n="forgot_password">Forgot Password?</a></p>
                </form>
                <p class="register-link"><span data-i18n="no_account">No account?</span> <a href="register.html" data-i18n="register_now">Register now</a></p>
            </div>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="common.js"></script>
    <script src="index.js"></script>
</body>
</html>
