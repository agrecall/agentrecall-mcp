<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentRecall - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="register-page" class="page">
        <div class="login-header">
            <a href="index.html" class="back-link">&larr; <span data-i18n="back_login">Back to Login</span></a>
        </div>
        <div class="login-container-wrapper">
            <div class="login-container">
                <div class="logo">
                    <h1>AgentRecall</h1>
                    <p data-i18n="create_account">Create New Account</p>
                </div>
                <form id="register-form">
                    <div class="form-group">
                        <label data-i18n="username">Username</label>
                        <input type="text" id="register-username" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="email">Email</label>
                        <div style="display:flex;gap:10px;">
                            <input type="email" id="register-email" placeholder="your@email.com" required style="flex:1;">
                            <button type="button" id="send-code-btn" class="btn" style="white-space:nowrap;" data-i18n="send_code">Send Code</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label data-i18n="verification_code">Verification Code</label>
                        <input type="text" id="register-code" placeholder="6-digit code" maxlength="6" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="password">Password</label>
                        <input type="password" id="register-password" placeholder="At least 8 characters" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" data-i18n="register">Register</button>
                </form>
                <p class="register-link"><span data-i18n="has_account">Already have an account?</span> <a href="index.html" data-i18n="login_now">Login now</a></p>
            </div>
        </div>
    </div>
    <script src="i18n.js"></script>
    <script src="common.js"></script>
    <script src="register.js"></script>
</body>
</html>
