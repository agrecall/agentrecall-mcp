<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentRecall - Reset Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="reset-page" class="page">
        <div class="login-header">
            <a href="index.html" class="back-link">&larr; <span data-i18n="back_login">Back to Login</span></a>
        </div>
        <div class="login-container-wrapper">
            <div class="login-container">
                <div class="logo">
                    <h1>AgentRecall</h1>
                    <p data-i18n="reset_password_title">Reset Password</p>
                </div>
                
                <form id="send-code-form">
                    <div class="form-group">
                        <label data-i18n="email">Email</label>
                        <input type="email" id="reset-email" placeholder="your@email.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" data-i18n="send_code">Send Verification Code</button>
                </form>

                <form id="reset-password-form" style="display:none;">
                    <div class="form-group">
                        <label data-i18n="verification_code">Verification Code</label>
                        <input type="text" id="reset-code" placeholder="6-digit code" maxlength="6" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="new_password">New Password</label>
                        <input type="password" id="new-password" placeholder="At least 8 characters" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="Confirm new password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" data-i18n="reset_password">Reset Password</button>
                </form>

                <p class="register-link"><span data-i18n="remember_password">Remember password?</span> <a href="index.html" data-i18n="login_now">Login now</a></p>
            </div>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="common.js"></script>
    <script src="reset-password.js"></script>
</body>
</html>
