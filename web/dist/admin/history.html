<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentRecall Admin - History</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Mobile Header -->
    <div class="mobile-header">
        <button class="mobile-menu-toggle" id="sidebar-toggle">&#9776;</button>
        <span class="mobile-title">AgentRecall</span>
        <div class="mobile-controls">
            <select class="lang-selector" id="lang-selector-main">
                <option value="en">EN</option>
                <option value="zh">中</option>
                <option value="zht">繁</option>
            </select>
            <button class="control-btn" id="theme-toggle-main" title="Toggle Theme">
                <span id="theme-icon-main">&#9728;</span>
            </button>
        </div>
    </div>
    
    <!-- PC Header -->
    <div class="pc-header">
        <div class="pc-header-title"></div>
        <div class="pc-header-controls">
            <select class="lang-selector" id="lang-selector-pc">
                <option value="en">English</option>
                <option value="zh">简体中文</option>
                <option value="zht">繁體中文</option>
            </select>
            <button class="control-btn" id="theme-toggle-pc" title="Toggle Theme">
                <span id="theme-icon-pc">&#9728;</span>
            </button>
        </div>
    </div>
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>&#129302; AgentRecall</h2>
            <button class="sidebar-close" id="sidebar-close">&#10005;</button>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="icon">&#128202;</span> <span data-i18n="dashboard">Dashboard</span>
            </a>
            <a href="apikeys.html" class="nav-item">
                <span class="icon">&#128273;</span> <span data-i18n="api_keys">API Keys</span>
            </a>
            <a href="history.html" class="nav-item active">
                <span class="icon">&#128220;</span> <span data-i18n="history">History</span>
            </a>
            </a>
            <a href="usage.html" class="nav-item">
                <span class="icon">&#128200;</span> <span data-i18n="usage_stats">Usage Stats</span>
            </a>
            <a href="users.html" class="nav-item admin-only hidden">
                <span class="icon">&#128101;</span> <span data-i18n="user_management">User Management</span>
            </a>
            <a href="system.html" class="nav-item admin-only hidden">
                <span class="icon">&#9881;</span> <span data-i18n="system_settings">System Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <span id="user-email">user@example.com</span>
                <span id="user-role" class="badge">USER</span>
            </div>
            <div class="footer-actions">
                <a href="/" class="btn btn-secondary btn-sm btn-block" data-i18n="back_home">Back to Home</a>
                <button id="logout-btn" class="btn btn-secondary btn-sm btn-block" data-i18n="logout">Logout</button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1 data-i18n="history">History</h1>
        </div>
        <div class="filter-bar">
            <select id="history-type-filter">
                <option value="" data-i18n="all_types">All Types</option>
                <option value="verify_health" data-i18n="health_check">Health Check</option>
            </select>
            <select id="history-days-filter">
                <option value="7" data-i18n="last_7_days">Last 7 Days</option>
                <option value="30" data-i18n="last_30_days">Last 30 Days</option>
                <option value="90" data-i18n="last_90_days">Last 90 Days</option>
            </select>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th data-i18n="type">Type</th><th data-i18n="api_key">API Key</th>
                        <th data-i18n="status">Status</th>
                        <th data-i18n="duration">Duration</th>
                        <th data-i18n="time">Time</th>
                        <th data-i18n="action">Action</th>
                    </tr>
                </thead>
                <tbody id="history-list">
                    <tr><td colspan="6" data-i18n="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="history-pagination"></div>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="/" data-i18n="nav_home">Home</a>
                <a href="/admin/" data-i18n="nav_admin">Admin</a>
                <a href="https://github.com/agentrecall" target="_blank">GitHub</a>
            </div>
            <p class="footer-copyright">&copy; <span data-i18n="footer_copyright">2024 AgentRecall. MIT License.</span></p>
        </div>
    </footer>

    <!-- History Detail Modal -->
    <div id="history-detail-modal" class="modal hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 data-i18n="interaction_detail">Interaction Detail</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="history-detail-content"></div>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="common.js"></script>
    <script src="history.js"></script>
</body>
</html>
